services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

  ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    env_file:
      - .env
    environment:
      BACKEND_URL: http://backend:8000
      INGEST_INTERVAL_SECONDS: "3600"
    depends_on:
      - backend
